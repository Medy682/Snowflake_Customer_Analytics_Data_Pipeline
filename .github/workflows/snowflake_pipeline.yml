name: Snowflake Data Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  snowflake-deploy:
    runs-on: ubuntu-latest

    env:
      # These specific names are recognized automatically by Snowflake CLI
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      # Standard vars for our query
      DB_WH: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      DB_NAME: ${{ secrets.SNOWFLAKE_DATABASE }}
      DB_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-cli

      - name: Execute Pipeline
        run: |
          snow sql -q "USE WAREHOUSE $DB_WH; USE DATABASE $DB_NAME; USE SCHEMA $DB_SCHEMA;"
          snow sql -f sql/01_setup/setup.sql
          snow sql -f sql/02_raw/create_raw_tables.sql
          snow sql -f sql/03_staging/staging_transformations.sql
          snow sql -f sql/04_data_quality/data_quality_checks.sql
          snow sql -f sql/05_analytics/business_insights.sql
