name: Snowflake Data Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  snowflake-deploy:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Stable Snow SQL pip installation

      - name: Install Snowflake CLI
        run: |
         python -m pip install --upgrade pip
         pip install snowflake-cli
   

      # ✅ Setup Layer

      - name: Execute Setup Scripts
        run: |
         snow sql \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            -q "USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; USE DATABASE $SNOWFLAKE_DATABASE; USE SCHEMA $SNOWFLAKE_SCHEMA;"

         snow sql \
           --account "$SNOWFLAKE_ACCOUNT" \
           --user "$SNOWFLAKE_USER" \
           --password "$SNOWFLAKE_PASSWORD" \
           -f sql/01_setup/setup.sql

      # ✅ Raw Layer
   
      - name: Load Raw Tables
        run: |
         snow sql \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            -q "USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; USE DATABASE $SNOWFLAKE_DATABASE; USE SCHEMA $SNOWFLAKE_SCHEMA;"

         snow sql \
           --account "$SNOWFLAKE_ACCOUNT" \
           --user "$SNOWFLAKE_USER" \
           --password "$SNOWFLAKE_PASSWORD" \
           -f sql/02_raw/create_raw_tables.sql
          
      # ✅ Staging Layer

      - name: run stage layer
        run: |
         snow sql \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASSWORD" \
            -q "USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; USE DATABASE $SNOWFLAKE_DATABASE; USE SCHEMA $SNOWFLAKE_SCHEMA;"

         snow sql \
           --account "$SNOWFLAKE_ACCOUNT" \
           --user "$SNOWFLAKE_USER" \
           --password "$SNOWFLAKE_PASSWORD" \
           -f sql/03_staging/staging_transformations.sql

      # ✅ Data Quality

      - name: run data quality checks
        run: |
         snow sql \
            --account "$SNOWFLAKE_ACCOUNT" \
            --user "$SNOWFLAKE_USER" \
            --password "$SNOWFLAKE_PASWORD" \
            -q "USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; USE DATABASE $SNOWFLAKE_DATABASE; USE SCHEMA $SNOWFLAKE_SCHEMA;"

         snow sql \
           --account "$SNOWFLAKE_ACCOUNT" \
           --user "$SNOWFLAKE_USER" \
           --password "$SNOWFLAKE_PASSWORD" \
           -f sql/04_data_quality/data_quality_checks.sql

      # ✅ Analytics Layer

      - name: build analytics layer
        run: |

         snowsql \
             --account "$snowflake_account" \
             --user "$snowflake_user" \
             --password "$snowflake_password" \
              -q "USE WAREHOUSE $snowflake_warehouse; USE DATABASE $snowflake_database; USE SCHEMA $snowflake_schema;"

         snowsql \
          --account "$snowflake_account" \
          --user "$snowflake_user" \
          --password "$snowflake_password" \
          -f sql/05_analytics/business_insights.sql
